<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>アルテマプラスター 立ち位置ナビ</title>
<style>
  :root{
    --bg:#09080f;
    --panel:#13111d;
    --panel-2:#1a1726;
    --line:#2e2940;
    --text:#f3f0fa;
    --muted:#9992ab;
    --accent:#bca8ff;
    --gold:#e6c45a;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;
    padding:max(18px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  button{font:inherit;}

  .app{width:min(100%,520px);margin:0 auto;}
  .top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:22px;}
  .title{margin:0;font-size:20px;letter-spacing:.02em;}
  .help{font-size:11px;color:var(--muted);white-space:nowrap;}

  .section{margin-bottom:22px;}
  .section-title{font-size:12px;font-weight:700;color:var(--muted);margin:0 0 10px;letter-spacing:.04em;}

  .center-toggle{
    width:88%;
    height:88%;
    border:1px solid rgba(188,168,255,.45);
    border-radius:50%;
    background:linear-gradient(180deg,#201b30,#151220);
    color:var(--text);
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:1px;
    box-shadow:0 8px 18px rgba(0,0,0,.28), 0 0 0 1px rgba(255,255,255,.025) inset;
    transition:transform .12s ease,border-color .15s ease,background .15s ease;
  }
  .center-toggle:active{transform:scale(.93);}
  .center-toggle .center-arrow{font-size:clamp(24px,8vw,34px);line-height:1;color:var(--accent);}
  .center-toggle strong{font-size:clamp(10px,3vw,13px);line-height:1.2;white-space:nowrap;}
  .center-toggle small{font-size:clamp(7px,2vw,9px);color:var(--muted);margin-top:2px;white-space:nowrap;}
  .center-toggle.ccw{
    border-color:rgba(230,196,90,.55);
    background:linear-gradient(180deg,#29231a,#19150f);
  }
  .center-toggle.ccw .center-arrow{color:var(--gold);}

  .instruction{margin:0 0 12px;font-size:12px;color:var(--muted);line-height:1.6;}

  .grid-picker{
    width:min(86vw,360px);
    aspect-ratio:1;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    gap:10px;
  }
  .g-cell{display:flex;align-items:center;justify-content:center;}
  .wm-btn{
    width:100%;height:100%;
    border:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#17131d;
    font-size:clamp(22px,7vw,30px);
    font-weight:900;
    cursor:pointer;
    box-shadow:0 8px 18px rgba(0,0,0,.28);
    transition:transform .1s ease, filter .1s ease;
  }
  .wm-btn.circle{border-radius:50%;}
  .wm-btn.square{border-radius:16px;transform:rotate(45deg) scale(.68);}
  .wm-btn.square span{transform:rotate(-45deg);}
  .wm-btn:active{filter:brightness(1.12);}
  .wm-btn.circle:active{transform:scale(.93);}
  .wm-btn.square:active{transform:rotate(45deg) scale(.61);}

  .tip{text-align:center;color:#645d75;font-size:10px;margin-top:14px;}

  /* Full-screen result overlay */
  .overlay{
    position:fixed;
    inset:0;
    z-index:1000;
    background:rgba(5,4,10,.98);
    display:none;
    overflow:hidden;
    touch-action:manipulation;
  }
  .overlay.open{display:block;}
  .overlay-inner{
    width:100%;height:100dvh;min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom));
  }
  .overlay-bar{
    min-height:52px;
    display:grid;
    grid-template-columns:44px 1fr 44px;
    align-items:center;
    gap:6px;
    flex:0 0 auto;
  }
  .overlay-title{text-align:center;min-width:0;}
  .overlay-title strong{display:block;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .overlay-title span{display:block;color:var(--muted);font-size:10px;margin-top:2px;}
  .icon-btn{
    width:42px;height:42px;border:1px solid var(--line);border-radius:50%;
    background:var(--panel);color:var(--text);font-size:22px;cursor:pointer;
  }
  .spacer{width:42px;height:42px;}

  .stage-area{
    flex:1 1 auto;
    min-height:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2px 0 8px;
  }
  .stage{
    width:min(98vw, calc(100dvh - 156px));
    height:min(98vw, calc(100dvh - 156px));
    max-width:760px;
    max-height:760px;
    display:block;
  }

  .overlay-footer{
    flex:0 0 auto;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    min-height:50px;
  }
  .change-btn{
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text);
    border-radius:999px;
    padding:11px 18px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
  }
  .change-btn:active{transform:scale(.97);}

  .num-dot{animation:pop .26s cubic-bezier(.2,1.25,.3,1) both;transform-origin:center;transform-box:fill-box;}
  .num-dot circle{fill:#171321;stroke:#d8ccff;stroke-width:3;}
  .num-dot text{
    fill:#fff;
    text-anchor:middle;
    dominant-baseline:central;
    font-size:24px;
    font-weight:900;
    pointer-events:none;
  }
  @keyframes pop{from{opacity:0;transform:scale(.45)}to{opacity:1;transform:scale(1)}}

  .mini-wm text{
    fill:#17131d;
    text-anchor:middle;
    dominant-baseline:central;
    font-size:17px;
    font-weight:900;
    pointer-events:none;
  }

  @media (max-height:620px){
    .overlay-bar{min-height:44px;}
    .icon-btn,.spacer{width:38px;height:38px;}
    .stage{width:min(92vw, calc(100dvh - 118px));height:min(92vw, calc(100dvh - 118px));}
    .overlay-footer{min-height:40px;}
    .change-btn{padding:8px 14px;}
  }
</style>
</head>
<body>
<main class="app">
  <div class="top">
    <h1 class="title">立ち位置ナビ</h1>
    <div class="help">アルテマプラスター</div>
  </div>

  <section class="section">
    <h2 class="section-title">突進が向いたマーカー</h2>
    <p class="instruction">中央で回転方向を切替 → 一番近いマーカーをタップ。</p>

    <div class="grid-picker" id="gridPicker">
      <div class="g-cell"><button class="wm-btn square" data-key="1" type="button"><span>1</span></button></div>
      <div class="g-cell"><button class="wm-btn circle" data-key="A" type="button"><span>A</span></button></div>
      <div class="g-cell"><button class="wm-btn square" data-key="2" type="button"><span>2</span></button></div>

      <div class="g-cell"><button class="wm-btn circle" data-key="D" type="button"><span>D</span></button></div>
      <div class="g-cell">
        <button class="center-toggle" id="centerRotationToggle" type="button" aria-label="回転方向を切り替える">
          <span class="center-arrow" id="centerArrow">↻</span>
          <strong id="centerLabel">時計回り</strong>
          <small>タップで切替</small>
        </button>
      </div>
      <div class="g-cell"><button class="wm-btn circle" data-key="B" type="button"><span>B</span></button></div>

      <div class="g-cell"><button class="wm-btn square" data-key="4" type="button"><span>4</span></button></div>
      <div class="g-cell"><button class="wm-btn circle" data-key="C" type="button"><span>C</span></button></div>
      <div class="g-cell"><button class="wm-btn square" data-key="3" type="button"><span>3</span></button></div>
    </div>
    <div class="tip">表示中は右上の × または「選び直す」で戻れます</div>
  </section>
</main>

<div class="overlay" id="resultOverlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="overlay-inner">
    <div class="overlay-bar">
      <div class="spacer" aria-hidden="true"></div>
      <div class="overlay-title">
        <strong id="overlayHeading">立ち位置</strong>
        <span id="overlaySub"></span>
      </div>
      <button class="icon-btn" id="closeOverlay" type="button" aria-label="閉じる">×</button>
    </div>

    <div class="stage-area">
      <svg viewBox="-18 -18 436 436" class="stage" id="mainSvg" aria-label="立ち位置図">
        <defs>
          <radialGradient id="arenaGrad" cx="50%" cy="45%" r="65%">
            <stop offset="0%" stop-color="#241c3c"/>
            <stop offset="72%" stop-color="#120f1d"/>
            <stop offset="100%" stop-color="#08070d"/>
          </radialGradient>
          <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#8b5cf6" stop-opacity=".5"/>
            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="200" cy="200" r="188" fill="url(#arenaGrad)" stroke="#4a4264" stroke-width="2"/>
        <circle cx="200" cy="200" r="188" fill="none" stroke="#5b5278" stroke-width="1" stroke-dasharray="2 7"/>
        <circle cx="200" cy="200" r="140" fill="none" stroke="#302a42" stroke-width="1"/>
        <circle cx="200" cy="200" r="36" fill="url(#coreGlow)"/>
        <g id="mini-waymarks"></g>
        <g id="numbers"></g>
      </svg>
    </div>

    <div class="overlay-footer">
      <button class="change-btn" id="chooseAgain" type="button">マーカーを選び直す</button>
    </div>
  </div>
</div>

<script>
const TRUE_ANGLE = { A:0, '2':45, B:90, '3':135, C:180, '4':225, D:270, '1':315 };
const WAYMARK_ORDER = ['A','2','B','3','C','4','D','1'];
const WAYMARK_SHAPE = { A:'circle', B:'circle', C:'circle', D:'circle', '1':'square', '2':'square', '3':'square', '4':'square' };
const WAYMARK_COLOR = { A:'#e8c34a', '1':'#e8c34a', B:'#e2554f', '2':'#e2554f', C:'#4fa3e8', '3':'#4fa3e8', D:'#a15fe0', '4':'#a15fe0' };

const GROUP1_PATTERN = [[337.5,'①'],[22.5,'⑧'],[292.5,'②'],[67.5,'⑦'],[247.5,'③'],[112.5,'⑥'],[202.5,'④'],[157.5,'⑤']];
const GROUP2_PATTERN = [[337.5,'⑧'],[22.5,'①'],[292.5,'⑦'],[67.5,'②'],[247.5,'⑥'],[112.5,'③'],[202.5,'⑤'],[157.5,'④']];

const CX = 200, CY = 200, RING_R = 143, NUM_R = 105;
let currentGroup = 1;
let currentKey = null;

const overlay = document.getElementById('resultOverlay');
const miniG = document.getElementById('mini-waymarks');
const numbersG = document.getElementById('numbers');

function computeLayout(group, key){
  const pattern = group === 1 ? GROUP1_PATTERN : GROUP2_PATTERN;
  const offset = TRUE_ANGLE[key];
  return pattern.map(([angle,label]) => ({ angle:(angle + offset + 360) % 360, label }));
}

function polar(cx, cy, r, angleDeg){
  const a = angleDeg * Math.PI / 180;
  return { x:cx + r * Math.sin(a), y:cy - r * Math.cos(a) };
}

function svgEl(name, attrs = {}){
  const el = document.createElementNS('http://www.w3.org/2000/svg', name);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  return el;
}

function renderWaymarks(){
  miniG.innerHTML = '';
  WAYMARK_ORDER.forEach(key => {
    const p = polar(CX, CY, RING_R, TRUE_ANGLE[key]);
    const g = svgEl('g', { class:'mini-wm' });
    let shape;

    if(WAYMARK_SHAPE[key] === 'circle'){
      shape = svgEl('circle', { cx:p.x, cy:p.y, r:16 });
    } else {
      shape = svgEl('rect', {
        x:p.x - 12, y:p.y - 12, width:24, height:24, rx:4,
        transform:`rotate(45 ${p.x} ${p.y})`
      });
    }

    shape.setAttribute('fill', WAYMARK_COLOR[key]);
    shape.setAttribute('stroke', key === currentKey ? '#ffffff' : '#17131d');
    shape.setAttribute('stroke-width', key === currentKey ? '4' : '1.5');
    g.appendChild(shape);

    const t = svgEl('text', { x:p.x, y:p.y + 1 });
    t.textContent = key;
    g.appendChild(t);
    miniG.appendChild(g);
  });
}

function renderNumbers(){
  numbersG.innerHTML = '';
  if(!currentKey) return;

  computeLayout(currentGroup, currentKey).forEach(({angle,label}, i) => {
    const p = polar(CX, CY, NUM_R, angle);
    const g = svgEl('g', { class:'num-dot' });
    g.style.animationDelay = `${i * 22}ms`;

    g.appendChild(svgEl('circle', { cx:p.x, cy:p.y, r:18 }));
    const t = svgEl('text', { x:p.x, y:p.y + 1 });
    t.textContent = label;
    g.appendChild(t);
    numbersG.appendChild(g);
  });
}

function updateOverlayText(){
  const rotation = currentGroup === 1 ? 'ケフカ：時計回り' : 'ケフカ：反時計回り';
  document.getElementById('overlayHeading').textContent = `${currentKey} マーカー基準`;
  document.getElementById('overlaySub').textContent = rotation;
}

function openOverlay(key){
  currentKey = key;
  updateOverlayText();
  renderWaymarks();
  renderNumbers();
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closeOverlay(){
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

function selectGroup(group){
  currentGroup = group;
  const toggle = document.getElementById('centerRotationToggle');
  const arrow = document.getElementById('centerArrow');
  const label = document.getElementById('centerLabel');

  const isClockwise = group === 1;
  toggle.classList.toggle('ccw', !isClockwise);
  arrow.textContent = isClockwise ? '↻' : '↺';
  label.textContent = isClockwise ? '時計回り' : '反時計回り';
  toggle.setAttribute('aria-label', `現在は${label.textContent}。タップで切り替える`);

  if(currentKey && overlay.classList.contains('open')){
    updateOverlayText();
    renderNumbers();
  }
}

// Apply waymark colors and open result immediately on tap.
document.querySelectorAll('.wm-btn').forEach(btn => {
  const key = btn.dataset.key;
  btn.style.background = WAYMARK_COLOR[key];
  btn.addEventListener('click', () => openOverlay(key));
});

document.getElementById('centerRotationToggle').addEventListener('click', () => {
  selectGroup(currentGroup === 1 ? 2 : 1);
});
document.getElementById('closeOverlay').addEventListener('click', closeOverlay);
document.getElementById('chooseAgain').addEventListener('click', closeOverlay);

overlay.addEventListener('click', e => {
  if(e.target === overlay) closeOverlay();
});

document.addEventListener('keydown', e => {
  if(e.key === 'Escape' && overlay.classList.contains('open')) closeOverlay();
});

selectGroup(1);
renderWaymarks();
</script>
</body>
</html>
